name: rootfs
run-name: Testing and Building Rootfs
on:
  workflow_dispatch:

jobs:
  build-rootfs:
    runs-on: ubuntu-latest
    environment: Main

    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install .[dev,cartesapplib]

      - name: Cartesapp Tests
        run: |
          pytest tests/

      - name: Test Examples with Cartesapp
        run: |
          cartesapp test examples/

      - name: Install Cartesi Machine
        run: |
          curl -s -L https://edubart.github.io/linux-packages/apt/keys/cartesi-deb-key.gpg | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/cartesi-deb-key.gpg

          # Add repository
          echo "deb https://edubart.github.io/linux-packages/apt stable/" | sudo tee /etc/apt/sources.list.d/cartesi-deb-apt.list

          # Update list of available packages
          sudo apt-get update

          # Install cartesi-machine
          sudo apt-get install -y cartesi-machine=${{ vars.EMULATOR_VERSION || '0.19.0-1' }} \
            cartesi-machine-linux-image=${{ vars.MACHINE_LINUX_VERSION || '0.20.0-1' }} \
            xgenext2fs=${{ vars.XGENEXT2_VERSION || '1.5.6-1' }}

      - name: Check Cartesi Machine
        run: |
          cartesi-machine --version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install .[dev,cartesapplib]

      - name: Set current version value
        run: |
          cartesapp_version=$(python -c "from importlib.metadata import version;print(version('cartesapp'))")
          echo Setting Version Var: $cartesapp_version
          echo "cartesapp_version=$cartesapp_version" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/.buildx-cache
          key: ${{ runner.os }}-buildx-rootfs-${{ env.cartesapp_version }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build rootfs
        run: |
          mkdir -p ${{ runner.temp }}/rootfs
          NON_INTERACTIVE_DOCKER=1 cartesapp build --log-level debug \
            --config-file .rootfs/config.toml \
            --base-path ${{ runner.temp }}/rootfs \
            --drives-only --drive-config root.target=dist \
            --drive-config "root.buildx=true" \
            --drive-config "root.extra_args=--cache-to type=local,dest=${{ runner.temp }}/.buildx-cache-new,mode=max --cache-from type=local,src=${{ runner.temp }}/.buildx-cache --progress plain --load"

      - name: Build rootfs image
        run: |
          docker buildx build --platform=linux/riscv64 -f .rootfs/Dockerfile \
            --target dist \
            --cache-from type=local,src=${{ runner.temp }}/.buildx-cache-new \
            --tag cartesapprootfs:${{ github.sha }} \
            --output type=oci,dest=${{ runner.temp }}/cartesapprootfs.tar
            --progress plain --load .

      - name: Echo Test with Cartesapp with cartesi machine
        run: |
          cd examples/echo_app
          cartesapp test --cartesi-machine --rootfs ${{ runner.temp }}/rootfs/root.ext2

      - name: Count Test with Cartesapp with cartesi machine
        run: |
          cd examples/count_app
          cartesapp test --cartesi-machine --rootfs ${{ runner.temp }}/rootfs/root.ext2

      - name: Wallet Test with Cartesapp with cartesi machine
        run: |
          cd examples/wallet_app
          cartesapp test --cartesi-machine --rootfs ${{ runner.temp }}/rootfs/root.ext2

      - name: Ledger Test with Cartesapp with cartesi machine
        run: |
          mkdir -p ${{ runner.temp }}/cartesapprootfs-dir
          tar -xf ${{ runner.temp }}/cartesapprootfs.tar -C ${{ runner.temp }}/cartesapprootfs-dir
          cd examples/ledger_app
          cartesapp test --cartesi-machine --rootfs ${{ runner.temp }}/rootfs/root.ext2 \
            --drive-config "state.extra_args=--load --build-context cartesapprootfs:${{ github.sha }}=oci-layout://${{ runner.temp }}/cartesapprootfs-dir:${{ github.sha }}" \
            --drive-config "state.build_args=CARTESAPP_ROOTFS_IMAGE=cartesapprootfs,CARTESAPP_ROOTFS_VERSION=${{ github.sha }}"

      - name: Move cache
        run: |
          echo $([ -d ${{ runner.temp }}/.buildx-cache ] && echo "Removing old cache") || echo "No old cache"
          rm -rf ${{ runner.temp }}/.buildx-cache
          echo $([ -d ${{ runner.temp }}/.buildx-cache-new ] && echo "Moving new cache") || echo "No new cache"
          [ -d ${{ runner.temp }}/.buildx-cache-new ] && mv ${{ runner.temp }}/.buildx-cache-new ${{ runner.temp }}/.buildx-cache

      - name: Upload rootfs
        uses: actions/upload-artifact@v7
        with:
          name: root.ext2
          path: ${{ runner.temp }}/rootfs/root.ext2
          if-no-files-found: error
          retention-days: 7

      - name: Node Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}-rootfs
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=raw,value=${{ env.cartesapp_version }},enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=ref,event=branch,enable=${{ github.ref != format('refs/heads/{0}', 'main') }}
            type=sha
          labels: |
            org.opencontainers.image.title=${{ github.repository }}
            org.opencontainers.image.description=CartesApp Sdk
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.url=${{ github.repository }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Rootfs Image Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          cache-from: type=local,src=${{ runner.temp }}/.buildx-cache
          platforms: linux/riscv64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: dist
          context: .
          file: .rootfs/Dockerfile
          push: true
